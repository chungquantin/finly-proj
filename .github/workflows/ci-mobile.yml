name: Mobile CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mobile-checks:
    name: Mobile - format, lint, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/mobile/pnpm-lock.yaml

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format, lint, and build checks
        run: cd "$GITHUB_WORKSPACE" && just lint-ts

      - name: Test
        run: pnpm run test -- --ci
