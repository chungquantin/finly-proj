name: Python Apps CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-checks:
    name: Agents and backend - lint and build checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Install lint/build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff build

      - name: Lint and build checks
        run: just lint-py
