name: Harness Readiness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run harness readiness check
        run: python3 scripts/check_harness_readiness.py
